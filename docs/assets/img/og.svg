<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid-sm" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.032)" stroke-width="1"/>
    </pattern>
    <pattern id="grid-lg" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M 160 0 L 0 0 0 160" fill="none" stroke="rgba(255,181,71,0.055)" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="1"/>
      <stop offset="60%" stop-color="#000" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <mask id="grid-mask">
      <rect width="1200" height="630" fill="url(#fade-top)"/>
    </mask>
    <linearGradient id="amber-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe4b8"/>
      <stop offset="60%" stop-color="#ffb547"/>
      <stop offset="100%" stop-color="#ff8a1a"/>
    </linearGradient>
    <filter id="glow-amber">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#05070b"/>

  <!-- Grid patterns -->
  <rect width="1200" height="630" fill="url(#grid-sm)" mask="url(#grid-mask)"/>
  <rect width="1200" height="630" fill="url(#grid-lg)" mask="url(#grid-mask)"/>

  <!-- Subtle top vignette gradient -->
  <rect width="1200" height="320" fill="url(#amber-grad)" opacity="0.025"/>

  <!-- Top-left mark -->
  <g transform="translate(56, 52)">
    <rect width="28" height="28" rx="7" fill="none" stroke="#ffb547" stroke-width="1.5" opacity="0.9"/>
    <rect x="6" y="6" width="16" height="16" rx="3" fill="#ffb547" opacity="0.85"/>
  </g>

  <!-- OPENTHYMOS wordmark -->
  <text
    x="96" y="74"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="13"
    font-weight="600"
    letter-spacing="3"
    fill="#e7ecf3"
    opacity="0.9"
  >OPENTHYMOS</text>

  <!-- Runtime pill -->
  <rect x="230" y="57" width="120" height="22" rx="11" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <text
    x="290" y="73"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="9.5"
    font-weight="500"
    letter-spacing="2.5"
    fill="#a2acbd"
    text-anchor="middle"
  >RUNTIME</text>

  <!-- Main tagline — three lines -->
  <text
    x="600" y="238"
    font-family="'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="64"
    font-weight="700"
    letter-spacing="-1"
    fill="#e7ecf3"
    text-anchor="middle"
  >Cognition proposes.</text>

  <text
    x="600" y="322"
    font-family="'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="64"
    font-weight="700"
    letter-spacing="-1"
    fill="url(#amber-grad)"
    text-anchor="middle"
    filter="url(#glow-amber)"
  >The runtime governs.</text>

  <text
    x="600" y="406"
    font-family="'Inter', 'SF Pro Display', system-ui, sans-serif"
    font-size="64"
    font-weight="700"
    letter-spacing="-1"
    fill="#e7ecf3"
    opacity="0.55"
    text-anchor="middle"
  >The ledger records.</text>

  <!-- Horizontal rule -->
  <line x1="56" y1="468" x2="1144" y2="468" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- Execution grammar -->
  <text
    x="56" y="520"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="16"
    font-weight="500"
    letter-spacing="0.5"
    fill="#ffb547"
    opacity="0.85"
  >Intent → Proposal → Commit</text>

  <!-- Right side: crate count / status -->
  <text
    x="1144" y="502"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="12"
    font-weight="400"
    letter-spacing="1"
    fill="#a2acbd"
    opacity="0.7"
    text-anchor="end"
  >Built in Rust</text>

  <text
    x="1144" y="522"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="12"
    font-weight="400"
    letter-spacing="1"
    fill="#6d7789"
    text-anchor="end"
  >Append-only · Replayable · Governed</text>

  <!-- Amber accent dot (top-left of tagline area) -->
  <circle cx="56" cy="200" r="3.5" fill="#ffb547" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.25;0.6" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner border accent -->
  <path d="M 1144 56 L 1200 56" stroke="#ffb547" stroke-width="1" opacity="0.3"/>
  <path d="M 1200 56 L 1200 112" stroke="#ffb547" stroke-width="1" opacity="0.3"/>
</svg>
