title: OpenThymos
tagline: "Cognition proposes. The runtime governs. The ledger records."
description: >-
  OpenThymos is a Rust execution runtime that governs what an AI agent is
  allowed to do. Cognition proposes intents; the runtime compiles them against
  ed25519-signed capability writs, enforces effect ceilings, budgets, and
  policy before any tool runs, and records every action — and every refusal —
  in an append-only, content-addressed ledger that replay can verify. One
  governed, replayable run state across CLI, VS Code, terminal, and web.
url: "https://gryszzz.github.io"
baseurl: "/open-thymos"
repo: "https://github.com/gryszzz/open-thymos"
author: "Exponet Labs"

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: /:basename/

plugins:
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - launch-playbook.md
  - monster-runtime-roadmap.md

defaults:
  - scope:
      path: ""
    values:
      layout: default
