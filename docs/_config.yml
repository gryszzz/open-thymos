title: OpenThymos
tagline: "Cognition proposes. The runtime governs. The ledger records."
description: >-
  OpenThymos is a Rust execution framework for coding agents. Cognition
  proposes intents; the runtime compiles proposals, enforces capability writs,
  applies policy, routes approved capabilities through governed execution
  boundaries, and exposes one replayable run state across CLI, VS Code,
  terminal, and web surfaces.
url: "https://gryszzz.github.io"
baseurl: "/open-thymos"
repo: "https://github.com/gryszzz/open-thymos"
author: "Exponet Labs"

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: /:basename/

plugins:
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - launch-playbook.md
  - monster-runtime-roadmap.md

defaults:
  - scope:
      path: ""
    values:
      layout: default
