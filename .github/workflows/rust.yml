name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: thymos

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: thymos
      - name: Build
        run: cargo build --workspace --verbose
      - name: Test
        run: cargo test --workspace --verbose
      # The Postgres ledger backend is feature-gated and not part of the default
      # build, so guard it against bit-rot: compile the backend and its gated
      # integration test (which only runs against a real DB via THYMOS_TEST_POSTGRES_URL).
      - name: Check Postgres backend (compile-only)
        run: |
          cargo check -p thymos-ledger --no-default-features --features postgres
          cargo test  -p thymos-ledger --features postgres --test postgres_integration --no-run
          # The server can now select the Postgres backend at startup; guard that
          # wiring (Runtime<Box<dyn LedgerStore>> + BlockingPostgresLedger) too.
          cargo check -p thymos-server --features postgres

  # Run the gated Postgres integration tests for real against a live database.
  # This is the proof that the Postgres ledger backend (and the blocking facade
  # the HTTP server uses) actually works — not just compiles. The same tests
  # skip cleanly when THYMOS_TEST_POSTGRES_URL is unset (e.g. local `cargo test`).
  postgres-integration:
    name: Postgres ledger (live)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: thymos_test
          POSTGRES_USER: thymos
          POSTGRES_PASSWORD: thymos
        ports:
          - 5432:5432
        # Hold the job until Postgres is accepting connections.
        options: >-
          --health-cmd "pg_isready -U thymos -d thymos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: thymos
      - name: Run gated Postgres integration tests
        env:
          THYMOS_TEST_POSTGRES_URL: postgres://thymos:thymos@localhost:5432/thymos_test
        run: |
          cargo test -p thymos-ledger --features postgres \
            --test postgres_integration -- --ignored --nocapture

  # Prove the live-LLM agent loop end-to-end when a key is configured. The test
  # skips cleanly (prints SKIP, passes) when ANTHROPIC_API_KEY is unset, so this
  # job is green without the secret and only spends a real API call when one is
  # set. Restricted to pushes on `main` to avoid spending budget on every PR
  # (and forks never receive the secret anyway).
  live-provider:
    name: Live provider (gated)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: thymos
      - name: Run gated live-provider test (skips cleanly without a key)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cargo test -p thymos-runtime --test live_provider \
            -- --ignored --nocapture
