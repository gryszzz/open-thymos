name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build binaries (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: tar.gz
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: thymos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: thymos
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p thymos-server -p thymos-cli
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/thymos-server${{ matrix.ext }} dist/
          cp target/${{ matrix.target }}/release/thymos${{ matrix.ext }}        dist/
          cd dist
          tar czf ../../thymos-${{ github.ref_name }}-${{ matrix.target }}.tar.gz thymos-server${{ matrix.ext }} thymos${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: thymos-${{ matrix.target }}
          path: thymos-*.tar.gz

  container:
    name: Build and push GitHub Packages container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/openthymos-runtime
            ghcr.io/${{ github.repository_owner }}/thymos-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=OpenThymos Runtime
            org.opencontainers.image.description=Execution substrate for governed machine cognition. Separates cognition from execution through the typed Intent -> Proposal -> Commit protocol.
            org.opencontainers.image.vendor=Exponet Labs
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
      - uses: docker/build-push-action@v6
        with:
          context: thymos
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: [binaries, container]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: thymos-*
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/thymos-*.tar.gz
          generate_release_notes: true
          body: |
            ## OpenThymos ${{ github.ref_name }}

            GitHub Packages images:
            - `ghcr.io/${{ github.repository_owner }}/openthymos-runtime:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/thymos-server:${{ github.ref_name }}` (compatibility alias)

            Binaries attached for linux/x86_64, darwin/arm64, darwin/x86_64, windows/x86_64.
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for setup.
