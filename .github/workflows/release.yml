name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build binaries (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: tar.gz
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: thymos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: thymos
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p thymos-server -p thymos-cli
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/thymos-server${{ matrix.ext }} dist/
          cp target/${{ matrix.target }}/release/thymos${{ matrix.ext }}        dist/
          cd dist
          tar czf ../../thymos-${{ github.ref_name }}-${{ matrix.target }}.tar.gz thymos-server${{ matrix.ext }} thymos${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: thymos-${{ matrix.target }}
          path: thymos-*.tar.gz

  container:
    name: Build and push GitHub Packages container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/openthymos-runtime
            ghcr.io/${{ github.repository_owner }}/thymos-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=OpenThymos Runtime
            org.opencontainers.image.description=Execution substrate for governed machine cognition. Separates cognition from execution through the typed Intent -> Proposal -> Commit protocol.
            org.opencontainers.image.vendor=Exponet Labs
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
      - uses: docker/build-push-action@v6
        with:
          context: thymos
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub Release
    needs: [binaries, container]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: thymos-*
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/thymos-*.tar.gz
          generate_release_notes: true
          body: |
            ## OpenThymos ${{ github.ref_name }}

            GitHub Packages images:
            - `ghcr.io/${{ github.repository_owner }}/openthymos-runtime:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/thymos-server:${{ github.ref_name }}` (compatibility alias)

            Binaries attached for linux/x86_64, darwin/arm64, darwin/x86_64, windows/x86_64.
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for setup.

  # ---------------------------------------------------------------------------
  # Desktop installers (.dmg / .msi / .AppImage) for OpenThymos Desktop.
  # UNTESTED in CI to date — the Tauri app is a scaffold (docs/rfcs/desktop-app.md).
  # Safe by construction: continue-on-error + APPENDS bundles to the existing
  # release, so a desktop build failure can never break the binary/container
  # release above. Bundles are currently UNSIGNED (Gatekeeper/SmartScreen will
  # warn); add Apple Developer ID + Windows certs as secrets to notarize/sign.
  # ---------------------------------------------------------------------------
  desktop:
    name: Desktop installer (${{ matrix.os }})
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Linux webview deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install app deps + icons
        working-directory: thymos/clients/desktop
        run: |
          npm install
          npm run icon
      - name: Build bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: thymos/clients/desktop
      - name: Append installers to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            thymos/clients/desktop/src-tauri/target/release/bundle/**/*.dmg
            thymos/clients/desktop/src-tauri/target/release/bundle/**/*.msi
            thymos/clients/desktop/src-tauri/target/release/bundle/**/*.AppImage

  # ---------------------------------------------------------------------------
  # Homebrew tap update: `brew install <owner>/tap/thymos`.
  # GUARDED — cleanly skips (a green no-op) until you create an
  # `<owner>/homebrew-tap` repo and add a HOMEBREW_TAP_TOKEN secret (a PAT with
  # write access to that tap repo). Then this regenerates the formula from the
  # published release tarballs on every tag.
  # ---------------------------------------------------------------------------
  homebrew:
    name: Update Homebrew tap
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Gate on tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap update (expected until the tap is configured)."
          fi
      - name: Render formula and push to tap
        if: steps.gate.outputs.enabled == 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          VER: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          base="https://github.com/$OWNER/open-thymos/releases/download/$VER"
          sha() { curl -fsSL "$base/$1" | sha256sum | cut -d' ' -f1; }
          ARM=$(sha "thymos-$VER-aarch64-apple-darwin.tar.gz")
          INTEL=$(sha "thymos-$VER-x86_64-apple-darwin.tar.gz")
          LINUX=$(sha "thymos-$VER-x86_64-unknown-linux-gnu.tar.gz")
          git clone "https://x-access-token:$TAP_TOKEN@github.com/$OWNER/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/thymos.rb <<RB
          class Thymos < Formula
            desc "Governed-cognition runtime — Intent → Proposal → Commit"
            homepage "https://github.com/$OWNER/open-thymos"
            version "${VER#v}"
            on_macos do
              on_arm do
                url "$base/thymos-$VER-aarch64-apple-darwin.tar.gz"
                sha256 "$ARM"
              end
              on_intel do
                url "$base/thymos-$VER-x86_64-apple-darwin.tar.gz"
                sha256 "$INTEL"
              end
            end
            on_linux do
              url "$base/thymos-$VER-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "$LINUX"
            end
            def install
              bin.install "thymos", "thymos-server"
            end
            test do
              system "#{bin}/thymos", "--help"
            end
          end
          RB
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/thymos.rb
          git commit -m "thymos $VER" || { echo "no change"; exit 0; }
          git push
