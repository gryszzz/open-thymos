name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build binaries (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            stable_asset: OpenThymos-cli-runtime-linux-x64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            stable_asset: OpenThymos-cli-runtime-macos-arm64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            stable_asset: OpenThymos-cli-runtime-macos-x64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            stable_asset: OpenThymos-cli-runtime-windows-x64.tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: thymos
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: thymos
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p thymos-server -p thymos-cli
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/thymos-server${{ matrix.ext }} dist/
          cp target/${{ matrix.target }}/release/thymos${{ matrix.ext }}        dist/
          cd dist
          release_name="${GITHUB_REF_NAME//\//-}"
          versioned="../../thymos-${release_name}-${{ matrix.target }}.tar.gz"
          tar czf "$versioned" thymos-server${{ matrix.ext }} thymos${{ matrix.ext }}
          cp "$versioned" "../../${{ matrix.stable_asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-cli-${{ matrix.target }}
          path: |
            thymos-*.tar.gz
            OpenThymos-cli-runtime-*.tar.gz
          if-no-files-found: error

  container:
    name: Build and push GitHub Packages container
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/openthymos-runtime
            ghcr.io/${{ github.repository_owner }}/thymos-server
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=OpenThymos Runtime
            org.opencontainers.image.description=Execution substrate for governed machine cognition. Separates cognition from execution through the typed Intent -> Proposal -> Commit protocol.
            org.opencontainers.image.vendor=Exponet Labs
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
      - uses: docker/build-push-action@v6
        with:
          context: thymos
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
            CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  desktop:
    name: Desktop installer (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            extension: dmg
            asset: OpenThymos-desktop-macos-arm64.dmg
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
            extension: dmg
            asset: OpenThymos-desktop-macos-x64.dmg
            ext: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: appimage
            extension: AppImage
            asset: OpenThymos-desktop-linux-x64.AppImage
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
            extension: msi
            asset: OpenThymos-desktop-windows-x64.msi
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            thymos
            thymos/clients/desktop/src-tauri
          key: desktop-${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: thymos/clients/desktop/package-lock.json
      - name: Linux webview deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install desktop dependencies
        working-directory: thymos/clients/desktop
        run: npm ci
      - name: Build bundled runtime
        working-directory: thymos
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target "${{ matrix.target }}" -p thymos-server
          mkdir -p clients/desktop/src-tauri/binaries
          cp \
            "target/${{ matrix.target }}/release/thymos-server${{ matrix.ext }}" \
            "clients/desktop/src-tauri/binaries/thymos-server-${{ matrix.target }}${{ matrix.ext }}"
      - name: Build bundles
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: thymos/clients/desktop
          args: >-
            --target ${{ matrix.target }}
            --bundles ${{ matrix.bundle }}
            --config src-tauri/tauri.release.conf.json
      - name: Normalize desktop asset name
        shell: bash
        run: |
          set -euo pipefail
          bundle_root="thymos/clients/desktop/src-tauri/target/${{ matrix.target }}/release/bundle"
          source_asset="$(find "$bundle_root" -type f -name '*.${{ matrix.extension }}' -print -quit)"
          test -n "$source_asset"
          mkdir -p release-assets
          cp "$source_asset" "release-assets/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-desktop-${{ matrix.target }}
          path: release-assets/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [binaries, desktop, container]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true
      - name: Create stable release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.dmg
            artifacts/*.msi
            artifacts/*.AppImage
          generate_release_notes: true
          body: |
            ## OpenThymos ${{ github.ref_name }}

            Stable downloads:
            - Desktop installers for macOS (Apple silicon and Intel), Windows x64, and Linux x64.
            - CLI + runtime archives for macOS, Windows, and Linux.

            Desktop installers include the local `thymos-server` runtime. They are
            currently unsigned, so Gatekeeper or SmartScreen may show a warning.

            GitHub Packages images:
            - `ghcr.io/${{ github.repository_owner }}/openthymos-runtime:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/thymos-server:${{ github.ref_name }}` (compatibility alias)

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for setup.

  # ---------------------------------------------------------------------------
  # Homebrew tap update: `brew install <owner>/tap/thymos`.
  # GUARDED — cleanly skips (a green no-op) until you create an
  # `<owner>/homebrew-tap` repo and add a HOMEBREW_TAP_TOKEN secret (a PAT with
  # write access to that tap repo). Then this regenerates the formula from the
  # published release tarballs on every tag.
  # ---------------------------------------------------------------------------
  homebrew:
    name: Update Homebrew tap
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Gate on tap token
        id: gate
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap update (expected until the tap is configured)."
          fi
      - name: Render formula and push to tap
        if: steps.gate.outputs.enabled == 'true'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          VER: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          base="https://github.com/$OWNER/open-thymos/releases/download/$VER"
          sha() { curl -fsSL "$base/$1" | sha256sum | cut -d' ' -f1; }
          ARM=$(sha "thymos-$VER-aarch64-apple-darwin.tar.gz")
          INTEL=$(sha "thymos-$VER-x86_64-apple-darwin.tar.gz")
          LINUX=$(sha "thymos-$VER-x86_64-unknown-linux-gnu.tar.gz")
          git clone "https://x-access-token:$TAP_TOKEN@github.com/$OWNER/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/thymos.rb <<RB
          class Thymos < Formula
            desc "Governed-cognition runtime — Intent → Proposal → Commit"
            homepage "https://github.com/$OWNER/open-thymos"
            version "${VER#v}"
            on_macos do
              on_arm do
                url "$base/thymos-$VER-aarch64-apple-darwin.tar.gz"
                sha256 "$ARM"
              end
              on_intel do
                url "$base/thymos-$VER-x86_64-apple-darwin.tar.gz"
                sha256 "$INTEL"
              end
            end
            on_linux do
              url "$base/thymos-$VER-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "$LINUX"
            end
            def install
              bin.install "thymos", "thymos-server"
            end
            test do
              system "#{bin}/thymos", "--help"
            end
          end
          RB
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/thymos.rb
          git commit -m "thymos $VER" || { echo "no change"; exit 0; }
          git push
